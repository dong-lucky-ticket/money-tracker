<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>记账助储 - 设置</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
<style>
        body { background-color: #f0f2f5; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .phone-container { width: 393px; height: 851px; background: #F7F9FC; position: relative; overflow: hidden; border: 8px solid #333; border-radius: 40px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); margin: 20px auto; }
        .status-bar { height: 44px; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: 600; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { color: #4A90E2; }
    </style>
</head>
<body>
<div class="phone-container flex flex-col">
<!-- 状态栏 -->
<div class="status-bar text-gray-800">
<span>09:41</span>
<div class="flex gap-1.5 items-center">
<iconify-icon icon="mdi:signal"></iconify-icon>
<iconify-icon icon="mdi:wifi"></iconify-icon>
<iconify-icon icon="mdi:battery"></iconify-icon>
</div>
</div>
<!-- 个人资料卡片 -->
<div class="px-5 py-8 bg-white flex items-center gap-5">
<div class="w-16 h-16 rounded-full overflow-hidden border-2 border-[#4A90E2]">
<img alt="User Avatar" class="w-full h-full object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-04-21/49caff4a5e504456b6bed960828d93f3.jpg"/>
</div>
<div class="flex-1">
<h2 class="text-xl font-bold text-gray-900">记账达人</h2>
<p class="text-sm text-gray-400 mt-0.5">已坚持记账 248 天</p>
</div>
<iconify-icon class="text-gray-300 text-2xl" icon="mdi:chevron-right"></iconify-icon>
</div>
<!-- 统计概览 -->
<div class="grid grid-cols-3 bg-white border-y py-4 px-2">
<div class="text-center">
<p class="text-lg font-bold text-gray-800">1,204</p>
<p class="text-[10px] text-gray-400 uppercase tracking-wider">总记账</p>
</div>
<div class="text-center border-x">
<p class="text-lg font-bold text-gray-800">15</p>
<p class="text-[10px] text-gray-400 uppercase tracking-wider">本月笔数</p>
</div>
<div class="text-center">
<p class="text-lg font-bold text-gray-800">22</p>
<p class="text-[10px] text-gray-400 uppercase tracking-wider">活跃分类</p>
</div>
</div>
<!-- 功能列表 -->
<div class="flex-1 overflow-y-auto no-scrollbar py-6 space-y-6">
<!-- 数据管理 -->
<div class="px-5">
<p class="text-xs font-bold text-gray-400 mb-3 px-1 uppercase tracking-widest">数据管理</p>
<div class="bg-white rounded-2xl overflow-hidden shadow-sm">
<div class="flex items-center gap-4 p-4 border-b border-gray-50 active:bg-gray-50">
<iconify-icon class="text-xl text-blue-500" icon="mdi:file-export-outline"></iconify-icon>
<span class="flex-1 text-sm font-medium text-gray-700">导出数据为 CSV</span>
<iconify-icon class="text-gray-300" icon="mdi:chevron-right"></iconify-icon>
</div>
<div class="flex items-center gap-4 p-4 border-b border-gray-50 active:bg-gray-50">
<iconify-icon class="text-xl text-green-500" icon="mdi:cloud-sync-outline"></iconify-icon>
<span class="flex-1 text-sm font-medium text-gray-700">云端备份与恢复</span>
<span class="text-xs text-gray-300">已关闭</span>
</div>
<div class="flex items-center gap-4 p-4 active:bg-gray-50">
<iconify-icon class="text-xl text-red-500" icon="mdi:trash-can-outline"></iconify-icon>
<span class="flex-1 text-sm font-medium text-red-500">清空所有本地账单</span>
<iconify-icon class="text-gray-300" icon="mdi:chevron-right"></iconify-icon>
</div>
</div>
</div>
<!-- 通用设置 -->
<div class="px-5">
<p class="text-xs font-bold text-gray-400 mb-3 px-1 uppercase tracking-widest">应用设置</p>
<div class="bg-white rounded-2xl overflow-hidden shadow-sm">
<div class="flex items-center gap-4 p-4 border-b border-gray-50 active:bg-gray-50">
<iconify-icon class="text-xl text-purple-500" icon="mdi:palette-outline"></iconify-icon>
<span class="flex-1 text-sm font-medium text-gray-700">主题风格切换</span>
<div class="flex items-center gap-1">
<span class="text-xs text-gray-400">简约蓝</span>
<iconify-icon class="text-gray-300" icon="mdi:chevron-right"></iconify-icon>
</div>
</div>
<div class="flex items-center gap-4 p-4 border-b border-gray-50 active:bg-gray-50">
<iconify-icon class="text-xl text-orange-500" icon="mdi:bell-outline"></iconify-icon>
<span class="flex-1 text-sm font-medium text-gray-700">记账提醒</span>
<div class="w-10 h-6 bg-[#4A90E2] rounded-full relative">
<div class="absolute right-0.5 top-0.5 w-5 h-5 bg-white rounded-full shadow-sm"></div>
</div>
</div>
<div class="flex items-center gap-4 p-4 active:bg-gray-50">
<iconify-icon class="text-xl text-indigo-500" icon="mdi:shield-lock-outline"></iconify-icon>
<span class="flex-1 text-sm font-medium text-gray-700">安全锁屏 (FaceID/指纹)</span>
<iconify-icon class="text-gray-300" icon="mdi:chevron-right"></iconify-icon>
</div>
</div>
</div>
<!-- 关于 -->
<div class="px-5">
<div class="bg-white rounded-2xl overflow-hidden shadow-sm">
<div class="flex items-center gap-4 p-4 border-b border-gray-50 active:bg-gray-50">
<iconify-icon class="text-xl text-gray-400" icon="mdi:information-outline"></iconify-icon>
<span class="flex-1 text-sm font-medium text-gray-700">关于记账助储</span>
<span class="text-xs text-gray-300">v2.4.0</span>
</div>
<div class="flex items-center gap-4 p-4 active:bg-gray-50">
<iconify-icon class="text-xl text-yellow-500" icon="mdi:star-outline"></iconify-icon>
<span class="flex-1 text-sm font-medium text-gray-700">去商店好评</span>
<iconify-icon class="text-gray-300" icon="mdi:chevron-right"></iconify-icon>
</div>
</div>
</div>
</div>
<!-- 底部导航栏 -->
<div class="bg-white h-20 border-t flex items-center justify-around px-2 pb-2">
<a class="flex flex-col items-center gap-1 text-gray-400" href="index.html">
<iconify-icon icon="mdi:format-list-bulleted" width="24"></iconify-icon>
<span class="text-[10px] font-medium">账单</span>
</a>
<a class="flex flex-col items-center gap-1 text-gray-400" href="report.html">
<iconify-icon icon="mdi:chart-pie" width="24"></iconify-icon>
<span class="text-[10px] font-medium">报表</span>
</a>
<a class="flex flex-col items-center gap-1 active-tab" href="settings.html">
<iconify-icon icon="mdi:account" width="24"></iconify-icon>
<span class="text-[10px] font-medium">我的</span>
</a>
</div>
</div>
</body>
</html>
